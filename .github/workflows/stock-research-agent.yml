name: Stock Research Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: read
  models: read

jobs:
  send-research:
    runs-on: ubuntu-latest
    env:
      TZ: America/Detroit
      LLM_PROVIDER: github_models
      GITHUB_MODELS_MODEL: openai/gpt-4.1
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      TIMEZONE: America/Detroit
      LOOKBACK_DAYS: "180"
      DIGEST_TICKERS: "VOO,QQQM,VGT,KLAC,NVDA,JPM"
      BUY_CANDIDATE_COUNT: "5"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check Detroit time
        id: schedule_gate
        run: |
          NOW="$(TZ=America/Detroit date '+%Y-%m-%d %H:%M:%S %Z')"
          HOUR="$(TZ=America/Detroit date +%H)"
          DAY="$(TZ=America/Detroit date +%u)"
          echo "Current Detroit time: $NOW"
          if [ "$DAY" != "7" ] || [ "$HOUR" != "18" ]; then
            echo "Skipping research because it is not Sunday 6 PM in Detroit."
            echo "run_now=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Sending weekly stock research now."
          echo "run_now=true" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        if: steps.schedule_gate.outputs.run_now == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v5

      - name: Set up Python
        if: steps.schedule_gate.outputs.run_now == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.schedule_gate.outputs.run_now == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Send research report
        if: steps.schedule_gate.outputs.run_now == 'true' || github.event_name == 'workflow_dispatch'
        run: python stock_research_agent.py | tee stock-research.log

      - name: Upload research report artifact
        if: steps.schedule_gate.outputs.run_now == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: stock-research-report
          path: research_reports/
          if-no-files-found: error
